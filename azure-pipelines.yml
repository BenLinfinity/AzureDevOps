# Starter pipeline
# Start with a minimal pipeline that you can customize to build and deploy your code.
# Add steps that build, run tests, deploy, and more:
# https://aka.ms/yaml

trigger:
- main

pool:
  vmImage: ubuntu-latest

variables:
  buildConfiguration: 'Release'
  packageVersion: '1.0.5'

steps:
- task: UseDotNet@2
  displayName: 'Install .NET Core SDK'
  inputs:
    packageType: 'sdk'
    version: '10.x'
  
- task: DotNetCoreCLI@2
  inputs:
    command: 'build'
    arguments: '--configuration Release'
  displayName: 'dotnet build Release'

# - task: DotNetCoreCLI@2
#   inputs:
#     command: 'publish'
#     publishWebProjects: false
#     arguments: '--configuration $(BuildConfiguration) --output $(Build.ArtifactStagingDirectory)'
#     zipAfterPublish: True
# - task: PublishPipelineArtifact@1
#   inputs:
#     targetPath: '$(Build.ArtifactStagingDirectory)' 
#     artifactName: 'myWebsite'

- task: UniversalPackages@0
  displayName: 'Publish to Azure Artifacts Feed'
  inputs:
    command: 'publish'
    publishDirectory: '$(Build.ArtifactStagingDirectory)'
    feedsToUsePublish: 'internal'
    vstsFeedPublish: 'Azure-Pipeline/HelloApp'
    vstsFeedPackagePublish: 'hello-app-universal'
    versionOption: 'custom'
    versionPublish: '$(packageVersion)'

# - task: gitversion-setup@4.5.0
#   displayName: Install GitVersion
#   inputs:
#     versionSpec: '6.x'

# - task: gitversion-execute@4.5.0
#   name: version_step # step id used as a reference for output values
#   displayName: Determine Version

- script: |
    npx semantic-release
  env:
    GH_TOKEN: $(GITHUB_TOKEN_SECRET)
    displayName: 'Run Semantic Release'

- script: |
    git fetch --tags
    LATEST_TAG=$(git describe --tags --abbrev=0)
    echo "The newly released version is: $LATEST_TAG"
    
    # Optional: Expose it as an Azure DevOps variable for subsequent tasks
    echo "##vso[task.setvariable variable=NewVersion]$LATEST_TAG"
  displayName: 'Print and Capture Version'


